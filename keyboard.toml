# Saurus keyboard - RMK configuration
# 36-key split keyboard (3x5 + 3 thumb keys per side)
# Hardware: Seeed XIAO BLE (nRF52840), col2row diodes

[rmk]
morse_max_num = 12

[keyboard]
name = "Saurus"
product_name = "Saurus"
vendor_id = 0x4C53
product_id = 0x5352
manufacturer = "Custom"
chip = "nrf52840"
# Keep USB enabled so the central half works as wired HID/Vial when plugged in.
# BLE remains enabled below for wireless host connections and the split link.
usb_enable = true

# Layout: 4 rows x 10 cols (split across two halves)
# Positions (3,0), (3,1), (3,8), (3,9) are not wired (no keys there)
[layout]
rows = 4
cols = 10
layers = 5
matrix_map = """
(0,0,L)  (0,1,L)  (0,2,L)  (0,3,L)  (0,4,L)    (0,5,R)  (0,6,R)  (0,7,R)  (0,8,R)  (0,9,R)
(1,0,L)  (1,1,L)  (1,2,L)  (1,3,L)  (1,4,L)    (1,5,R)  (1,6,R)  (1,7,R)  (1,8,R)  (1,9,R)
(2,0,L)  (2,1,L)  (2,2,L)  (2,3,L)  (2,4,L)    (2,5,R)  (2,6,R)  (2,7,R)  (2,8,R)  (2,9,R)
                  (3,2,*)  (3,3,L)  (3,4,*)    (3,5,*)  (3,6,R)  (3,7,*)
"""

# Aliases for shifted symbols and macOS shortcuts
[aliases]
# Shifted symbols
PLUS  = "WM(Equal, LShift)"
STAR  = "WM(Kc8, LShift)"
EXCL  = "WM(Kc1, LShift)"
AT_S  = "WM(Kc2, LShift)"
HASH  = "WM(Kc3, LShift)"
DLLR  = "WM(Kc4, LShift)"
PRCNT = "WM(Kc5, LShift)"
CARET = "WM(Kc6, LShift)"
AMPR  = "WM(Kc7, LShift)"
LPAR  = "WM(Kc9, LShift)"
RPAR  = "WM(Kc0, LShift)"
PIPE  = "WM(Backslash, LShift)"
LCBR  = "WM(LeftBracket, LShift)"
RCBR  = "WM(RightBracket, LShift)"
LT_S  = "WM(Comma, LShift)"
GT_S  = "WM(Dot, LShift)"
COLN  = "WM(Semicolon, LShift)"
TILD  = "WM(Grave, LShift)"
UNDS  = "WM(Minus, LShift)"
QUES  = "WM(Slash, LShift)"
# macOS shortcuts
MAC_UNDO   = "WM(Z, LGui)"
MAC_CUT    = "WM(X, LGui)"
MAC_COPY   = "WM(C, LGui)"
MAC_PASTE  = "WM(V, LGui)"
MAC_LOGOUT = "WM(Q, LCtrl | LGui)"

# Layer 0: "dusk" - base alpha layer (modified Night layout with home row mods)
# ┌───┬───┬───┬───┬───┐   ┌───┬───┬───┬───┬───┐
# │ B │ F │ L │ D │ Q │   │ ' │ W │ O │ U │ Y │
# ├───┼───┼───┼───┼───┤   ├───┼───┼───┼───┼───┤
# │N/⇧│S/⌃│H/⌘│T/L3│ K │   │ J │C/L3│A/⌘│E/⌃│I/⇧│
# ├───┼───┼───┼───┼───┤   ├───┼───┼───┼───┼───┤
# │ X │ V │ M │ G │ Z │   │ - │ P │ , │ . │ / │
# └───┴───┼───┼───┼───┤   ├───┼───┼───┼───┴───┘
#         │Tab│R/L1│Ent/L4│   │Bsp│Spc/L2 │Esc│
#         └───┴───┴───┘   └───┴───┴───┘
[[layer]]
name = "dusk"
keys = """
B      F      L      D        Q        Quote       W      O        U      Y
TD(2)  TD(3)  TD(4)  TD(5)    K        J           TD(6)  TD(7)    TD(8)  TD(9)
X      V      M      G        Z        Minus       P      Comma    Dot    Slash
              TD(0)  TD(10)   Enter    Backspace   TD(1)  GraveEscape
"""

# Layer 1: "num" - numbers and macOS editing shortcuts
# ┌────┬────┬────┬────┬────┐   ┌───┬───┬───┬───┬───┐
# │    │    │    │    │    │   │ + │ 7 │ 8 │ 9 │ * │
# ├────┼────┼────┼────┼────┤   ├───┼───┼───┼───┼───┤
# │ ⇧  │ ⌃  │ ⌘  │ ⌥  │ CW │   │ - │ 4 │ 5 │ 6 │ 0 │
# ├────┼────┼────┼────┼────┤   ├───┼───┼───┼───┼───┤
# │Undo│Cut │Copy│Pste│    │   │ . │ 1 │ 2 │ 3 │ / │
# └────┴────┼────┼────┼────┤   ├───┼───┼───┼───┴───┘
#           │    │    │    │   │   │   │   │
#           └────┴────┴────┘   └───┴───┴───┘
[[layer]]
name = "num"
keys = """
No            No            No            No            No               @PLUS         Kc7    Kc8   Kc9   @STAR
LShift        LCtrl         LGui          LAlt          CapsWordToggle   Minus         Kc4    Kc5   Kc6   Kc0
@MAC_UNDO     @MAC_CUT      @MAC_COPY     @MAC_PASTE    No               Equal         Kc1    Kc2   Kc3   Slash
                            _             _             _                Backspace     Space  Dot
"""

# Layer 2: "nav" - navigation and media controls
# ┌────┬────┬────┬────┬────┐   ┌────┬────┬────┬────┬────────┐
# │    │ ⏮  │ ⏯  │ ⏭  │    │   │    │Mute│Vol-│Vol+│Logout  │
# ├────┼────┼────┼────┼────┤   ├────┼────┼────┼────┼────────┤
# │ ⇧  │ ⌃  │ ⌘  │ ⌥  │ CW │   │    │ ←  │ ↓  │ ↑  │  →     │
# ├────┼────┼────┼────┼────┤   ├────┼────┼────┼────┼────────┤
# │    │    │    │    │    │   │    │Home│PgDn│PgUp│  End    │
# └────┴────┼────┼────┼────┤   ├────┼────┼────┼────┴────────┘
#           │    │    │    │   │    │    │    │
#           └────┴────┴────┘   └────┴────┴────┘
[[layer]]
name = "nav"
keys = """
No            MediaPrevTrack  MediaPlayPause  MediaNextTrack  No               No            AudioMute     AudioVolDown  AudioVolUp    @MAC_LOGOUT
LShift        LCtrl           LGui            LAlt            CapsWordToggle   No            Left          Down          Up            Right
No            No              No              No              No               No            Home          PageDown      PageUp        End
                              _               _               _                _             _             _
"""

# Layer 3: "sym" - symbols
# ┌───┬───┬───┬───┬───┐   ┌───┬───┬───┬───┬───┐
# │ ^ │ < │ > │ - │ | │   │ ` │ { │ } │ & │ \ │
# ├───┼───┼───┼───┼───┤   ├───┼───┼───┼───┼───┤
# │ _ │ * │ / │ = │ $ │   │ # │ ( │ ) │ ; │ : │
# ├───┼───┼───┼───┼───┤   ├───┼───┼───┼───┼───┤
# │ ! │ + │ [ │ ] │ % │   │ ~ │ @ │ , │ . │ ? │
# └───┴───┼───┼───┼───┤   ├───┼───┼───┼───┴───┘
#         │   │Spc│   │   │Ent│Bsp│   │
#         └───┴───┴───┘   └───┴───┴───┘
[[layer]]
name = "sym"
keys = """
@CARET        @LT_S         @GT_S         Minus         @PIPE            Grave         @LCBR         @RCBR         @AMPR         Backslash
@UNDS         @STAR         Slash         Equal         @DLLR            @HASH         @LPAR         @RPAR         Semicolon     @COLN
@EXCL         @PLUS         LeftBracket   RightBracket  @PRCNT           @TILD         @AT_S         Comma         Dot           @QUES
                            _             MO(1)         Enter            Backspace     Space         TD(1)
"""

# Layer 4: "controls" - Bluetooth profile and output controls
# User0..2 = BT profiles, User3/4 = next/previous, User5 = clear current BT bond,
# User6 = toggle USB/BLE output, User7 = clear split peer after a 5s hold.
[[layer]]
name = "controls"
keys = """
User0         User1         User2         User3         User4            User5         User6         User7         No            No
No            No            No            No            No               No            No            No            No            No
@MAC_UNDO     @MAC_CUT      @MAC_COPY     @MAC_PASTE    No               No            No            No            No            No
                            _             _             _                _             _             _
"""

# Behavior: tap-hold tuning for home row mods
[behavior.morse]
enable_flow_tap = true
hold_timeout = "250ms"
gap_timeout = "250ms"
prior_idle_time = "120ms"

[behavior.morse.profiles]
# This profile is recommended on the home row, when enable_flow_tap = true, and the hold action activates a layer or acts as a modifier (aka home row mod)
HRM = { permissive_hold = true, unilateral_tap = true, hold_timeout = "400ms", gap_timeout = "250ms" }
FH = { hold_on_other_press = true, unilateral_tap = false, hold_timeout = "200ms", gap_timeout = "200ms" }
PH = { permissive_hold = true, unilateral_tap = false, hold_timeout = "200ms", gap_timeout = "200ms" }
TH = { normal_mode = true, unilateral_tap = false, hold_timeout = "200ms", gap_timeout = "200ms" }

[[behavior.morse.morses]]
tap = "Tab"
hold = "MO(4)"
hold_after_tap = "Tab"
profile = "TH"

[[behavior.morse.morses]]
tap = "Space"
hold = "MO(2)"
hold_after_tap = "Space"
profile = "FH"

[[behavior.morse.morses]]
tap = "N"
hold = "LShift"
hold_after_tap = "N"
profile = "HRM"

[[behavior.morse.morses]]
tap = "S"
hold = "LCtrl"
hold_after_tap = "S"
profile = "HRM"

[[behavior.morse.morses]]
tap = "H"
hold = "LGui"
hold_after_tap = "H"
profile = "HRM"

[[behavior.morse.morses]]
tap = "T"
hold = "MO(3)"
hold_after_tap = "T"
profile = "HRM"

[[behavior.morse.morses]]
tap = "C"
hold = "MO(3)"
hold_after_tap = "C"
profile = "HRM"

[[behavior.morse.morses]]
tap = "A"
hold = "RGui"
hold_after_tap = "A"
profile = "HRM"

[[behavior.morse.morses]]
tap = "E"
hold = "RCtrl"
hold_after_tap = "E"
profile = "HRM"

[[behavior.morse.morses]]
tap = "I"
hold = "RShift"
hold_after_tap = "I"
profile = "HRM"

[[behavior.morse.morses]]
tap = "R"
hold = "MO(1)"
hold_after_tap = "R"
profile = "PH"

[storage]
# Default nRF52840 storage location
start_addr = 0x000A0000
num_sectors = 8
# Set to true for one flash only when you intentionally want to wipe Vial,
# BLE bonds, selected BLE profile, and split peer storage.
clear_storage = false

[ble]
enabled = true
passkey_entry = true

[host]
# Hold the top-left and top-right keys on the base layer to unlock Vial.
unlock_keys = [[0, 0], [0, 9]]

# Split keyboard configuration
# Left half = central (connects to host via BLE/USB)
# Right half = peripheral (connects to central via BLE)
[split]
connection = "ble"

[split.central]
rows = 4
cols = 5
row_offset = 0
col_offset = 0
ble_addr = [0x18, 0xe2, 0x21, 0x80, 0xc0, 0xc7]
battery_adc_pin = "vddh"

[split.central.matrix]
matrix_type = "normal"
# RMK uses col2row as default - matches the Saurus PCB diode direction
# row_pins = physical matrix rows (sense/input)
# col_pins = physical matrix columns (drive/output)
# XIAO BLE pin mapping: D0=P0_02, D1=P0_03, D2=P0_28, D3=P0_29,
#   D6=P1_11, D7=P1_12, D8=P1_13, D9=P1_14, D10=P1_15
row_pins = ["P1_14", "P1_13", "P1_12", "P1_11"]
col_pins = ["P1_15", "P0_29", "P0_28", "P0_03", "P0_02"]

[[split.peripheral]]
rows = 4
cols = 5
row_offset = 0
col_offset = 5
ble_addr = [0x7e, 0xfe, 0x73, 0x9e, 0x66, 0xe3]
battery_adc_pin = "vddh"

[split.peripheral.matrix]
matrix_type = "normal"
# Same row pins as central, mirrored column pins
row_pins = ["P1_14", "P1_13", "P1_12", "P1_11"]
col_pins = ["P0_02", "P0_03", "P0_28", "P0_29", "P1_15"]
